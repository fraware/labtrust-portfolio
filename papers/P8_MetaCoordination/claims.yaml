        - "impl/src/labtrust_portfolio/meta_controller.py"
      table_ids: ["Table 1"]
      figure_ids: ["Figure 0", "Figure 1"]

  - id: "C2"
    statement: "Switching is auditable and replayable: every regime change is justified by logged criteria and does not silently violate higher-level intent."
    evidence:
      release_id: "meta_eval"
      confidence: "high"  # trace events + payload; script-generated tables
      artifact_paths:
        - "impl/src/labtrust_portfolio/adapters/meta_adapter.py"
        - "kernel/trace/TRACE.v0.1.schema.json"
      table_ids: ["Table 1"]
      figure_ids: []

  - id: "C3"
    statement: "Under pre-specified stress, meta-coordination is non-inferior to the fixed regime on paired collapse counts (meta_collapses <= fixed_collapses) while preserving the safety proxy; strict reduction (meta < fixed) is reported separately via meta_strictly_reduces_collapse and McNemar on discordant pairs."
    evidence:
