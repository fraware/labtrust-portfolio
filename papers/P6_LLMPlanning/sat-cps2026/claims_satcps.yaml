# SaT-CPS 2026 venue claims (P6). Four claims only; no "sufficient", "comprehensive", "guarantee", "eliminate", "state-of-the-art", unqualified "robust".
# Evidence: expanded red-team + confusable deputy + jailbreak-style + ponr_gate + adaptive suite; Figure 1 = decision path; case study = denial trace.
# Real-LLM (Table 1b): default --real-llm-suite full (red + confusable + jailbreak), --real-llm-runs 10; historical OpenAI snapshot 2026-03-17 used 5 runs/case and 13 cases/model (pre-expansion). Optional Prime matrix: separate artifact dir; do not mix denominators across runs.
# Run manifests: timestamp_iso, evaluator_version, policy_version, prompt_template_hash (real-LLM). Appendix: export_p6_reproducibility_table.py. See EXPERIMENTS_RUNBOOK.md, README.md (evidence tiers).

