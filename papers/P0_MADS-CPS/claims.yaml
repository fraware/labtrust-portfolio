# P0 MADS-CPS claim table (peer-review revision)
# Max 3-4 claims; each claim maps to release_id, artifact_paths, table_id, figure_id.
# See docs/DRAFT_CONVERSION_CHECKLIST.md and docs/STATE_OF_THE_ART_CRITERIA.md.

paper_id: "P0_MADS-CPS"
title: "MADS-CPS: A Machine-Checkable Minimum Assurance Bar for Agentic Cyber-Physical Workflows"
release_id: "p0_e3_release"

claims:
  - id: "C1"
    statement: "Within a fixed declared envelope, conformance can be defined over external artifacts and validation predicates without reference to the internal coordination or planning algorithm."
    evidence:
      release_id: "p0_e3_release"
      confidence: "high"
      artifact_paths:
        - "kernel/mads/NORMATIVE.v0.1.md"
        - "kernel/mads/VERIFICATION_MODES.v0.1.md"
        - "datasets/releases/p0_e3_release/release_manifest.json"
        - "datasets/releases/p0_e3_release/trace.json"
      table_ids: ["Table 1", "Table 3"]
      figure_ids: ["Figure 1"]

  - id: "C2"
    statement: "For a fixed schema set and declared envelope, conformance tiers reduce to machine-checkable predicates over artifact presence, schema validity, replay status, and PONR coverage."
    evidence:
      release_id: "p0_e3_release"
      artifact_paths:
        - "kernel/eval/MAESTRO_REPORT.v0.2.schema.json"
        - "datasets/releases/p0_e3_release/evidence_bundle.json"
        - "datasets/releases/p0_e3_release/conformance.json"
        - "impl/src/labtrust_portfolio/conformance.py"
      table_ids: ["Table 1", "Table 2"]
      figure_ids: ["Figure 1", "Figure 2"]

  - id: "C3"
    statement: "Logs or transcripts that lack integrity binding, trace-to-report linkage, or declared replay semantics are insufficient for admissible third-party verification."
    evidence:
      release_id: "p0_e3_release"
      artifact_paths:
        - "kernel/mads/EVIDENCE_BUNDLE.v0.1.schema.json"
        - "kernel/eval/MAESTRO_REPORT.v0.2.schema.json"
        - "datasets/releases/p0_e3_release/evidence_bundle.json"
        - "datasets/runs/e2_redaction_demo/evidence_bundle_redacted.json"
        - "datasets/releases/p0_e3_release/trace.json"
      table_ids: ["Table 1", "Table 2"]
      figure_ids: ["Figure 1", "Figure 3"]

  - id: "C4"
    statement: "PONR-gated release converts a qualitative notion of 'high impact' into an enforceable control: irreversible or authoritative transitions are denied unless admissibility predicates hold or an auditable override is recorded."
    evidence:
      release_id: "p0_e3_release"
      artifact_paths:
        - "kernel/mads/PONR_ENFORCEMENT.v0.1.md"
        - "impl/src/labtrust_portfolio/release.py"
        - "impl/src/labtrust_portfolio/gatekeeper.py"
        - "datasets/releases/p0_e3_release/release_manifest.json"
      table_ids: ["Table 1", "Table 2"]
      figure_ids: []

