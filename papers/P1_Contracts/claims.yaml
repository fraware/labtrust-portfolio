# P1 Coordination Contracts claim table (Draft conversion checklist 2.1)
# Max 3-4 claims; each claim maps to release_id, artifact_paths, table_id, figure_id.
# See docs/DRAFT_CONVERSION_CHECKLIST.md and docs/STATE_OF_THE_ART_CRITERIA.md.

paper_id: "P1_Contracts"
title: "Coordination Contracts: Typed State, Ownership, and Valid Transitions Above Messaging for Cyber-Physical Systems"
release_id: "contracts_eval"

claims:
  - id: "C1"
    statement: "Within a declared contract model, a trace-derived validator can detect and deny invalid writes corresponding to specified coordination failure classes (ownership conflicts, stale writes, reorder-sensitive violations)."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "bench/contracts/corpus/"
        - "impl/src/labtrust_portfolio/contracts.py"
      table_ids: ["Table 1", "Table 2"]
      figure_ids: ["Figure 0"]
      confidence: high

  - id: "C2"
    statement: "Contract validation can be executed from event traces plus declared configuration alone, without privileged hidden state, enabling auditability and replay-based diagnosis."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "docs/P1_TRACE_DERIVABILITY.md"
        - "impl/src/labtrust_portfolio/contracts.py"
      table_ids: ["Table 1"]
      figure_ids: []
      confidence: high

  # C3: design claim; no full cross-transport deployment in this version
  - id: "C3"
    statement: "The contract model is transport-agnostic by construction (defined over event/state semantics above the messaging layer); the paper demonstrates this through a reference store and a LADS-shaped event mapping, not a full cross-transport deployment."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "kernel/contracts/CONTRACT_MODEL.v0.1.md"
        - "kernel/interop/OPC_UA_LADS_MAPPING.v0.1.md"
      table_ids: []
      figure_ids: ["Figure 0"]
      confidence: medium

  - id: "C4"
    statement: "A reference implementation can enforce the contract with bounded per-write overhead on the evaluated workload."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "datasets/runs/contracts_eval/scale_test.json"
      table_ids: ["Table 1"]
      figure_ids: ["Figure 1"]
      confidence: high

