# P1 Coordination Contracts claim table (Draft conversion checklist 2.1)
# Max 3-4 claims; each claim maps to release_id, artifact_paths, table_id, figure_id.
# See docs/DRAFT_CONVERSION_CHECKLIST.md and docs/STATE_OF_THE_ART_CRITERIA.md.

paper_id: "P1_Contracts"
title: "Coordination Contracts: Trace-Derived Admission for Shared CPS State"
release_id: "contracts_eval"

claims:
  - id: "C1"
    statement: "A trace-derived coordination-admission layer can detect and deny coordination-invalid shared-state mutations that delivery-level correctness and simpler boundary policies miss, while remaining replayable and operationally lightweight."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "datasets/runs/contracts_eval_real/eval.json"
        - "datasets/contracts_real/"
        - "impl/src/labtrust_portfolio/contracts.py"
      table_ids: ["tab:summary", "tab:comparators", "tab:classmetrics", "tab:classci"]
      figure_ids: ["fig:flow", "fig:heatmap"]
      confidence: high

  - id: "C2"
    statement: "Contract validation can be executed from event traces plus declared configuration alone, without privileged hidden state, enabling auditability and replay-based diagnosis."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "docs/P1_TRACE_DERIVABILITY.md"
        - "impl/src/labtrust_portfolio/contracts.py"
      table_ids: ["tab:summary", "tab:composition"]
      figure_ids: []
      confidence: high

  # C3: design claim; no full cross-transport deployment in this version
  - id: "C3"
    statement: "The transport claim is boundary scoped only: if two ingestion paths induce identical boundary event/state semantics, they must produce identical verdict vectors; this is not a claim of live transport equivalence."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "kernel/contracts/CONTRACT_MODEL.v0.1.md"
        - "kernel/interop/OPC_UA_LADS_MAPPING.v0.1.md"
      table_ids: ["tab:parity"]
      figure_ids: ["fig:flow"]
      confidence: medium

  - id: "C4"
    statement: "Operational overhead remains bounded in replay: latency and runtime breakdowns are reported for normalization, validation, and state-update phases over synthetic and real/quasi-real traces."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "datasets/runs/contracts_eval_real/eval.json"
        - "datasets/runs/contracts_eval/scale_test.json"
      table_ids: ["tab:summary"]
      figure_ids: ["fig:latency", "fig:scale"]
      confidence: high

