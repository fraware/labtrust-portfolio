# P1 Coordination Contracts claim table (Draft conversion checklist 2.1)
# Max 3-4 claims; each claim maps to release_id, artifact_paths, table_id, figure_id.
# See docs/DRAFT_CONVERSION_CHECKLIST.md and docs/STATE_OF_THE_ART_CRITERIA.md.

paper_id: "P1_Contracts"
title: "Coordination Contracts: Trace-Derived Admission for Shared CPS State"
release_id: "contracts_eval"

claims:
  - id: "C1"
    statement: "Within a declared contract model, a trace-derived validator can detect and deny invalid writes corresponding to specified coordination failure classes (ownership conflicts, stale writes, reorder-sensitive violations) with high precision and recall across a 54+ sequence challenge corpus, including adversarial cases (cross-key interleaving, delayed release/reassignment, concurrent controller races). Async stress runs are additional robustness characterization under delay/skew/reorder profiles. The contribution is composition-level: keyed authority, temporal admissibility, reason-coded denial, and trace-derivability at the coordination boundary."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "datasets/runs/contracts_eval/stress_results.json"
        - "bench/contracts/corpus/"
        - "impl/src/labtrust_portfolio/contracts.py"
      table_ids: ["tab:summary", "tab:comparators", "tab:classmetrics", "tab:classci"]
      figure_ids: ["fig:flow", "fig:heatmap"]
      confidence: high

  - id: "C2"
    statement: "Contract validation can be executed from event traces plus declared configuration alone, without privileged hidden state, enabling auditability and replay-based diagnosis."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "docs/P1_TRACE_DERIVABILITY.md"
        - "impl/src/labtrust_portfolio/contracts.py"
      table_ids: ["tab:summary", "tab:composition"]
      figure_ids: []
      confidence: high

  # C3: design claim; no full cross-transport deployment in this version
  - id: "C3"
    statement: "The contract model is transport-agnostic by construction (defined over event/state semantics above the messaging layer); the paper demonstrates boundary semantics through a reference store, LADS-shaped mapping, and multi-sequence parity of verdict vectors under identical boundary events, not empirical equivalence of live transports."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "kernel/contracts/CONTRACT_MODEL.v0.1.md"
        - "kernel/interop/OPC_UA_LADS_MAPPING.v0.1.md"
      table_ids: ["tab:parity"]
      figure_ids: ["fig:flow"]
      confidence: medium

  - id: "C4"
    statement: "A reference implementation can enforce the contract with bounded per-write overhead on the evaluated workload, with latency percentiles (median, p95, p99) and bootstrap CIs reported at the event level. Async stress outputs provide additional profile-stratified latency and correctness characterization under delay/skew/reorder settings."
    evidence:
      release_id: "contracts_eval"
      artifact_paths:
        - "datasets/runs/contracts_eval/eval.json"
        - "datasets/runs/contracts_eval/scale_test.json"
        - "datasets/runs/contracts_eval/stress_results.json"
      table_ids: ["tab:summary"]
      figure_ids: ["fig:latency", "fig:scale", "fig:stress"]
      confidence: high

