# P5 Scaling Laws claim table (synchronized to frozen artifacts)

paper_id: "P5_ScalingLaws"
title: "When More Agents Hurt: Coordination scaling in MAESTRO CPS scenarios"
release_id: "scaling_eval"

claims:
  - id: "C1"
    statement: >
      Coordination behavior is a reproducible function of scenario structure,
      agent count, and coordination regime in MAESTRO thin-slice CPS runs, and
      scaling deltas directly show where adding agents increases coordination
      tax and can reduce throughput.
    evidence:
      release_id: "scaling_eval"
      confidence: "high"
      artifact_paths:
        - "datasets/runs/scaling_eval/heldout_results.json"
        - "datasets/runs/scaling_summary/regime_agent_summary.json"
        - "datasets/runs/multiscenario_runs/"
        - "impl/src/labtrust_portfolio/thinslice.py"
        - "impl/src/labtrust_portfolio/coordination_profile.py"
      table_ids: ["Table 1", "Table 5", "Table 8"]
      figure_ids: ["Figure 2", "Figure 3", "Figure 4"]

  - id: "C2"
    statement: >
      Held-out evaluation is leakage-aware: admissible vs oracle baselines are
      separated, and strict family-holdout rules null protocol-level regression
      when any fold cannot fit. On the rich coordination grid, primary
      tasks_completed trigger_met may be false on scenario or regime holdouts
      (e.g. ill-conditioned OLS on a rare scenario fold, or regression not
      beating the num-tasks bucket baseline); ridge stabilization in P5 OLS
      and re-frozen JSON should be cited for the latest numbers.
    evidence:
      release_id: "scaling_eval"
      confidence: "medium"
      artifact_paths:
        - "datasets/runs/scaling_eval/heldout_results.json"
        - "datasets/runs/scaling_eval_family/heldout_results.json"
        - "datasets/runs/scaling_eval_regime/heldout_results.json"
        - "datasets/runs/scaling_eval_agent_count/heldout_results.json"
        - "datasets/runs/scaling_eval_fault/heldout_results.json"
      table_ids: ["Table 1", "Table 2", "Table 4", "Table 7"]
      figure_ids: ["Figure 1", "Figure 5"]

  - id: "C3"
    statement: >
      A regime recommendation artifact is available (counterfactual scoring with
      uncertainty and unsafe-region flags), but recommendation selection accuracy
      is currently weak and should be reported as exploratory rather than strong
      decision superiority.
    evidence:
      release_id: "scaling_eval"
      confidence: "low"
      artifact_paths:
        - "datasets/runs/scaling_recommend/recommendation_eval.json"
        - "scripts/scaling_recommend.py"
        - "datasets/runs/scaling_eval/heldout_results.json"
      table_ids: ["Table 3", "Table 6"]
      figure_ids: ["Figure 4"]
