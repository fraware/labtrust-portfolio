# P5 claim table (NeurIPS evaluation-protocol posture; synchronized to frozen artifacts)

paper_id: "P5_ScalingLaws"
title: "When More Agents Hurt: Held-Out Evaluation of Coordination Scaling in Cyber-Physical Agent Systems"
release_id: "scaling_eval_rich_grid_7200"

claims:
  - id: "C1"
    statement: >
      Empirical coordination-scaling patterns: coordination load and throughput vary
      with scenario family, coordination regime, and agent count in MAESTRO thin-slice
      runs; frozen regime×agent summaries quantify coordination-tax growth and
      throughput deltas (including 1→8 agent comparisons). This is not a universal CPS law.
    evidence:
      release_id: "scaling_eval_rich_grid_7200"
      confidence: "high"
      artifact_paths:
        - "datasets/runs/scaling_summary/regime_agent_summary.json"
        - "datasets/runs/multiscenario_runs/"
        - "impl/src/labtrust_portfolio/thinslice.py"
        - "impl/src/labtrust_portfolio/coordination_profile.py"
      table_ids: ["Main Table 1"]
      figure_ids: ["Figure 2", "Figure 3", "Figure 4"]

  - id: "C2"
    statement: >
      Held-out evaluation enforces admissible train-only baselines versus oracle
      diagnostics, strict null handling when any fold cannot fit regression, and
      ridge-stabilized linear regression for the default P5 feature vector. On the
      current 7200-row publishable grid, leave-one-family-out meets trigger_met for
      tasks_completed; leave-one-scenario-out does not (fails vs the num-tasks bucket
      baseline). Under scenario-heldout, coordination tax is much more predictable than
      throughput (tasks_completed) or latency-derived error amplification by admissible
      regression MAE and trigger_met (Main Table 4; per-target MAE scale caveat). Other
      protocols vary — see Main Table 3.
    evidence:
      release_id: "scaling_eval_rich_grid_7200"
      confidence: "medium"
      artifact_paths:
        - "datasets/runs/scaling_eval/heldout_results.json"
        - "datasets/runs/scaling_eval_family/heldout_results.json"
        - "datasets/runs/scaling_eval_regime/heldout_results.json"
        - "datasets/runs/scaling_eval_agent_count/heldout_results.json"
        - "datasets/runs/scaling_eval_fault/heldout_results.json"
        - "impl/src/labtrust_portfolio/scaling.py"
        - "scripts/scaling_heldout_eval.py"
      table_ids: ["Main Table 2", "Main Table 3", "Main Table 4", "Appendix baselines"]
      figure_ids: ["Figure 1", "Figure 5"]

  - id: "C3"
    statement: >
      Exploratory recommendation artifacts exist; regime-selection accuracy is low.
      Architecture selection is not deployment-ready — see claim_status in
      recommendation_eval.json.
    evidence:
      release_id: "scaling_eval_rich_grid_7200"
      confidence: "low"
      artifact_paths:
        - "datasets/runs/scaling_recommend/recommendation_eval.json"
        - "scripts/scaling_recommend_eval.py"
        - "datasets/runs/scaling_eval/heldout_results.json"
      table_ids: ["Appendix recommendation"]
      figure_ids: ["Figure 4"]
