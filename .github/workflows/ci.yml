name: ci

on:
  push:
  pull_request:

jobs:
  p3-paper-latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended
      - name: Compile P3 DRAFT (two passes)
        run: |
          cd papers/P3_Replay
          pdflatex -interaction=nonstopmode -halt-on-error DRAFT.tex
          pdflatex -interaction=nonstopmode -halt-on-error DRAFT.tex

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pyyaml
      - name: Validate kernel schemas
        run: |
          python scripts/validate_kernel.py
      - name: Run unit tests
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python -m unittest discover -s tests -q
      - name: P6 camera-ready bundle integrity
        run: |
          python scripts/verify_p6_camera_ready_bundle.py
      - name: P6 robust GPT bundle verify (20260424 legacy partial audit)
        run: |
          python scripts/verify_p6_robust_gpt_bundle.py
      - name: P6 full robust GPT paper-ready gate (when 20260425 bundle + API JSON exist)
        run: |
          if [ -f datasets/runs/llm_eval_robust_gpt_20260425_full/red_team_results.json ]; then
            python scripts/verify_p6_robust_gpt_bundle.py \
              --run-dir datasets/runs/llm_eval_robust_gpt_20260425_full \
              --schema full \
              --red-team-results datasets/runs/llm_eval_robust_gpt_20260425_full/red_team_results.json \
              --require-paper-ready
          else
            echo "skip: datasets/runs/llm_eval_robust_gpt_20260425_full/red_team_results.json not committed"
          fi
      - name: P6 stress corpus validator-only audit
        run: |
          python scripts/run_robust_gpt_eval.py --synthetic-stress-audit /tmp/p6_stress_validator_audit.json
          python -c "import json,sys; d=json.load(open('/tmp/p6_stress_validator_audit.json')); sys.exit(0 if d.get('all_match') else 1)"
      - name: P6 claims consistency
        run: |
          python scripts/verify_p6_claims_consistency.py
      - name: P6 narrative consistency
        run: |
          python scripts/verify_p6_narrative_consistency.py
      - name: P6 freeze stack orchestrator
        run: |
          python scripts/verify_p6_freeze_stack.py --write-report /tmp/p6_freeze_stack_report.json
      - name: Run thin-slice and validate outputs
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python -m labtrust_portfolio run-thinslice --out-dir datasets/runs/ci_thinslice
          PYTHONPATH=impl/src python -m labtrust_portfolio load-profile
          PYTHONPATH=impl/src python -m labtrust_portfolio check-conformance datasets/runs/ci_thinslice
      - name: Release dataset from thin-slice run
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python -m labtrust_portfolio release-dataset datasets/runs/ci_thinslice ci_release_${{ github.run_id }}

  conditional-evals:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pyyaml
      - name: P0 E3 variance (replay-link, 2 scenarios)
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/produce_p0_e3_release.py --runs 5 --scenarios toy_lab_v0,lab_profile_v0 --no-release
      - name: P0 E2 redaction demo
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/e2_redaction_demo.py --out datasets/runs/e2_redaction_demo
      - name: P3 Replay eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/replay_eval.py --overhead-curve --overhead-runs 5 --bootstrap-reps 50 --thin-slice-seeds 42,43 --l1-twin
          PYTHONPATH=impl/src python scripts/verify_p3_replay_summary.py --strict-curve
      - name: P4 MAESTRO fault sweep (multi-scenario)
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/maestro_fault_sweep.py --seeds 5
      - name: P4 MAESTRO baselines
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/maestro_baselines.py --scenario toy_lab_v0 --seeds 2
      - name: P4 MAESTRO anti-gaming eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/maestro_antigaming_eval.py --out datasets/runs/maestro_antigaming
      - name: P1 Contracts eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/contracts_eval.py
      - name: P7 Assurance eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/run_assurance_eval.py
          PYTHONPATH=impl/src python scripts/export_assurance_tables.py
      - name: P2 REP-CPS eval (10 seeds, delay sweep)
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/rep_cps_eval.py --delay-sweep 0,0.05,0.1
      - name: P5 Generate multi-scenario runs
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/generate_multiscenario_runs.py --seeds 2
      - name: P5 Scaling held-out eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/scaling_heldout_eval.py
      - name: P6 LLM red-team eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/llm_redteam_eval.py
      - name: P8 Meta-coordination eval
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/meta_eval.py --seeds 1,2,3 --run-naive --fault-threshold 0
      - name: P8 Meta scenario v1 smoke
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/meta_eval.py --seeds 1,2 --scenario regime_stress_v1 --out /tmp/p8_meta_v1_ci
      - name: P8 verify comparison schema
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/verify_p8_meta_artifacts.py --comparison datasets/runs/meta_eval/comparison.json
      - name: P8 Meta collapse sweep (2 drop_probs, 3 seeds)
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python scripts/meta_collapse_sweep.py --drop-probs 0.15,0.2 --seeds 3 --out datasets/runs/meta_eval
