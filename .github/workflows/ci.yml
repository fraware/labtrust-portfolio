name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - name: Validate kernel schemas
        run: |
          python scripts/validate_kernel.py
      - name: Run unit tests
        env:
          LABTRUST_KERNEL_DIR: ${{ github.workspace }}/kernel
        run: |
          PYTHONPATH=impl/src python -m unittest discover -s tests -q
